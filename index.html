<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dr. Astrid Hähnlein</title>

  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Libre Baskerville', serif;
      margin: 0;
      padding: 0;
      line-height: 1.95;
      letter-spacing: 0.2px;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 110px 34px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 42px;
      margin-bottom: 80px;
    }

    img.profile {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 2px;
      opacity: 0.92;
    }

    h1 {
      font-size: 34px;
      font-weight: 400;
      margin: 0;
    }

    p.subtitle {
      margin-top: 6px;
      font-size: 15px;
    }

    details {
      margin-bottom: 56px;
    }

    summary {
      font-size: 18px;
      cursor: pointer;
      font-weight: 400;
      margin-bottom: 18px;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    summary::before {
      content: "▶";
      font-size: 12px;
      opacity: 0.8;
      transition: transform 0.2s ease;
    }

    details[open] summary::before {
      content: "▼";
    }

    a {
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    ul {
      padding-left: 0;
      list-style: none;
      margin-top: 18px;
    }

    li {
      margin-bottom: 10px;
    }

    p {
      margin-top: 16px;
    }

    .block { margin-top: 18px; }

    /* ---------------------- */
    /* THEME 1 (soft dark minimal) */
    /* ---------------------- */
    body.theme1 {
      background-color: #262626;
      color: #d8d2cc;
    }
    body.theme1 a { color: #a8b3bd; }

    /* ---------------------- */
    /* THEME 2 (lighter editorial dark) */
    /* ---------------------- */
    body.theme2 {
      background-color: #2f2f2f;
      color: #e2ddd7;
    }
    body.theme2 a { color: #b6c2cc; }

    /* ---------------------- */
    /* THEME 3 (warm sepia academic) */
    /* ---------------------- */
    body.theme3 {
      background-color: #2b2622;
      color: #e6dfd6;
    }
    body.theme3 a { color: #c7b8a6; }

    /* default theme */
    body { background-color: #262626; color: #d8d2cc; }
    a { color: #a8b3bd; }

    /* theme switcher */
    .switcher {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 8px;
    }

    .switcher button {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: inherit;
      padding: 6px 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
    }

  </style>
</head>
<body class="theme1">

<div class="switcher">
  <button onclick="setTheme('theme1')">1</button>
  <button onclick="setTheme('theme2')">2</button>
  <button onclick="setTheme('theme3')">3</button>
</div>

<div class="container">

  <header>
    <img class="profile" src="dein-foto.jpg" alt="Profilbild">
    <div>
      <h1>Dr. Astrid Hähnlein</h1>
      <p class="subtitle">Independent Researcher, Alumna University Freiburg</p>
    </div>
  </header>

  <details open>
    <summary>Über mich & Kontakt</summary>
    <div class="block">
      <p>Kurzer, ruhiger Absatz über Ihre Forschung und Interessen.</p>
      <p>
        Email: <a href="mailto:astrid.haehnlein[at]posteo.de">astrid.haehnlein [at]posteo.de</a><br>
       
      </p>
    </div>
  </details>

  <details>
    <summary>Publikationen</summary>
    <div class="block">
      <ul>
        <li>Autorin (Jahr): Titel. <em>Journal / Verlag</em></li>
        <li>Autorin (Jahr): Titel. <em>Journal / Verlag</em></li>
      </ul>
    </div>
  </details>

</div>

<script>
function setTheme(t) {
  document.body.classList.remove('theme1','theme2','theme3');
  document.body.classList.add(t);
}
</script>

</body>
</html>
